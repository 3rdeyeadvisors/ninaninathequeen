name: Repository Audit

on:
  schedule:
    - cron: '0 0 */3 * *' # Every 3 days
  workflow_dispatch: # Allow manual triggering

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: Run Audit Script
      id: run-audit
      run: |
        chmod +x ./scripts/audit.sh
        ./scripts/audit.sh || echo "audit_failed=true" >> $GITHUB_ENV

    - name: Set PR Title
      if: env.audit_failed == 'true'
      run: echo "PR_TITLE=Auto-Fix: Audit Discovery $(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: Create Optimization PR
      if: env.audit_failed == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore: repository optimization audit"
        title: ${{ env.PR_TITLE }}
        body: |
          ### Automated Audit Results

          The automated audit found the following areas for optimization or required fixes:

          $(cat audit_report.md)

          Please review and merge these changes to maintain repository health.
        branch: audit/optimization
        base: main
        delete-branch: true
